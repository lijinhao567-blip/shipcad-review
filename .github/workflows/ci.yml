name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test CAD worker
        run: |
          python -m pip install --upgrade pip
          pip install -r cad_worker/requirements.txt
          pytest cad_worker/tests -q

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Test backend
        run: mvn -f backend-spring/pom.xml test

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Build frontend
        working-directory: frontend-vue
        run: |
          npm ci
          npm run build
