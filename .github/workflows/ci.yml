name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-workers:
    name: Python workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            cad_worker/requirements.txt
            ocr_worker/requirements.txt
            vision_worker/requirements.txt

      - name: Check Python dependency pins
        run: python tools/check_python_requirements.py

      - name: Check GitHub Action pins
        run: python tools/check_action_pins.py

      - name: Check deployment security defaults
        run: python tools/check_deployment_security.py

      - name: Install worker test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cad_worker/requirements.txt -r ocr_worker/requirements.txt

      - name: Validate vision dataset structure
        run: python tools/validate_vision_dataset.py

      - name: Check rule golden coverage
        run: python tools/check_rule_golden_coverage.py

      - name: Validate complex DXF parser dataset
        run: python tools/check_complex_dxf_dataset.py

      - name: Validate external DXF candidate manifest
        run: python tools/check_external_dxf_candidates.py --manifest-only

      - name: Test CAD, OCR, Vision, and dataset tooling
        run: python -m pytest cad_worker/tests ocr_worker/tests vision_worker/tests tools/tests -q

  backend:
    name: Spring backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test backend
        run: mvn --batch-mode --no-transfer-progress -f backend-spring/pom.xml test

  frontend:
    name: Vue frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-vue
        run: npm ci

      - name: Check dxf-viewer parser compatibility
        run: node tools/check_dxf_viewer_dataset.mjs

      - name: Build frontend
        working-directory: frontend-vue
        run: npm run build

  live-api-e2e:
    name: Live API E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: cad_worker/requirements.txt

      - name: Check Python dependency pins
        run: python tools/check_python_requirements.py

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install CAD worker dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cad_worker/requirements.txt

      - name: Package backend
        run: mvn --batch-mode --no-transfer-progress -q -f backend-spring/pom.xml -DskipTests package

      - name: Start CAD worker and backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/shipcad-ci/data" "$RUNNER_TEMP/shipcad-ci/logs"

          nohup python -m uvicorn cad_worker.app.main:app \
            --host 127.0.0.1 \
            --port 9000 \
            >"$RUNNER_TEMP/shipcad-ci/logs/cad-worker.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/shipcad-ci/cad-worker.pid"

          app_jar="$(find backend-spring/target -maxdepth 1 -name '*.jar' ! -name '*.original' | head -n 1)"
          if [[ -z "$app_jar" ]]; then
            echo "Packaged backend jar was not found." >&2
            exit 1
          fi

          export SPRING_PROFILES_ACTIVE=dev
          export SHIPCAD_WORKER_URL=http://127.0.0.1:9000
          export SHIPCAD_STORAGE_ROOT="$RUNNER_TEMP/shipcad-ci/data"
          export SHIPCAD_OBJECT_STORAGE_LOCAL_ROOT="$RUNNER_TEMP/shipcad-ci/data"
          export SHIPCAD_DATASOURCE_URL="jdbc:h2:file:$RUNNER_TEMP/shipcad-ci/data/shipcad;MODE=MySQL;DATABASE_TO_LOWER=TRUE"
          nohup java -jar "$app_jar" \
            >"$RUNNER_TEMP/shipcad-ci/logs/backend.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/shipcad-ci/backend.pid"

          for attempt in {1..90}; do
            cad_ok=false
            backend_ok=false
            curl --fail --silent --show-error http://127.0.0.1:9000/health >/dev/null && cad_ok=true
            curl --fail --silent --show-error http://127.0.0.1:8080/api/health >/dev/null && backend_ok=true
            if [[ "$cad_ok" == true && "$backend_ok" == true ]]; then
              exit 0
            fi
            if ! kill -0 "$(cat "$RUNNER_TEMP/shipcad-ci/cad-worker.pid")" 2>/dev/null; then
              echo "CAD worker exited before becoming ready." >&2
              exit 1
            fi
            if ! kill -0 "$(cat "$RUNNER_TEMP/shipcad-ci/backend.pid")" 2>/dev/null; then
              echo "Backend exited before becoming ready." >&2
              exit 1
            fi
            sleep 2
          done

          echo "Services did not become ready within 180 seconds." >&2
          exit 1

      - name: Run golden dataset E2E
        run: python tools/run_golden_e2e.py --keep-going

      - name: Run task retry E2E
        run: python tools/run_task_retry_e2e.py

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-api-e2e-diagnostics
          if-no-files-found: ignore
          retention-days: 14
          path: |
            ${{ runner.temp }}/shipcad-ci/logs
            .run/task-retry-e2e
