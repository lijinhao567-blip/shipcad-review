name: SBOM

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  component-sbom:
    name: SBOM ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            path: backend-spring
          - component: frontend
            path: frontend-vue
          - component: cad-worker
            path: cad_worker
          - component: vision-worker
            path: vision_worker
          - component: ocr-worker
            path: ocr_worker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate SPDX component SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ matrix.path }}
          format: spdx-json
          artifact-name: shipcad-review-${{ matrix.component }}.spdx.json
          upload-artifact-retention: 30
          upload-release-assets: false
          syft-version: v1.44.0
