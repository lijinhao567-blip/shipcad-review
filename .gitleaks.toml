title = "ShipCAD Review Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Exclude generated, downloaded, runtime, and local model directories that are not published."
paths = [
  '''(^|[\\/])\.git([\\/]|$)''',
  '''(^|[\\/])\.tools([\\/]|$)''',
  '''(^|[\\/])\.venv([\\/]|$)''',
  '''(^|[\\/])\.run([\\/]|$)''',
  '''(^|[\\/])data([\\/]|$)''',
  '''(^|[\\/])models([\\/]|$)''',
  '''(^|[\\/])node_modules([\\/]|$)''',
  '''(^|[\\/])target([\\/]|$)''',
  '''(^|[\\/])dist([\\/]|$)'''
]
