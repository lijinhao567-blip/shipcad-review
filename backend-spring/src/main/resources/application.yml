server:
  port: 8080

spring:
  application:
    name: shipcad-review
  datasource:
    url: ${SHIPCAD_DATASOURCE_URL:jdbc:h2:file:../data/db/shipcad;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: ${SHIPCAD_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SHIPCAD_DATASOURCE_USERNAME:sa}
    password: ${SHIPCAD_DATASOURCE_PASSWORD:}
  data:
    redis:
      repositories:
        enabled: false
      host: ${SHIPCAD_REDIS_HOST:127.0.0.1}
      port: ${SHIPCAD_REDIS_PORT:6379}
      password: ${SHIPCAD_REDIS_PASSWORD:}
      timeout: ${SHIPCAD_REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${SHIPCAD_FLYWAY_ENABLED:true}
    locations: classpath:db/migration/h2
    validate-on-migrate: true
    baseline-on-migrate: ${SHIPCAD_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

shipcad:
  storage-root: ${SHIPCAD_STORAGE_ROOT:../data}
  worker-url: ${SHIPCAD_WORKER_URL:http://127.0.0.1:9000}
  vision-url: ${SHIPCAD_VISION_URL:http://127.0.0.1:9100}
  ocr-url: ${SHIPCAD_OCR_URL:http://127.0.0.1:9200}
  cors-origin: ${SHIPCAD_CORS_ORIGIN:http://127.0.0.1:5173}
  review-queue:
    mode: ${SHIPCAD_REVIEW_QUEUE_MODE:in-memory}
    core-size: ${SHIPCAD_REVIEW_QUEUE_CORE_SIZE:2}
    max-size: ${SHIPCAD_REVIEW_QUEUE_MAX_SIZE:4}
    capacity: ${SHIPCAD_REVIEW_QUEUE_CAPACITY:50}
    redis:
      queue-key: ${SHIPCAD_REVIEW_QUEUE_REDIS_KEY:shipcad:review:queue}
      processing-key: ${SHIPCAD_REVIEW_QUEUE_REDIS_PROCESSING_KEY:shipcad:review:processing:local}
      poll-seconds: ${SHIPCAD_REVIEW_QUEUE_REDIS_POLL_SECONDS:2}
  security:
    session-hours: ${SHIPCAD_SESSION_HOURS:8}
    seed-dev-users: false
    bootstrap-admin:
      username: ${SHIPCAD_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${SHIPCAD_BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${SHIPCAD_BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
