services:
  valkey:
    image: valkey/valkey:8.1.8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    profiles:
      - object-storage
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-}"
    volumes:
      - ../data/minio:/data
    ports:
      - "9002:9000"
      - "9001:9001"

  cad-worker:
    build:
      context: ..
      dockerfile: cad_worker/Dockerfile
    environment:
      LIBREDWG_DWG2DXF_BIN: dwg2dxf
    ports:
      - "9000:9000"

  vision-worker:
    profiles:
      - vision
    build:
      context: ..
      dockerfile: vision_worker/Dockerfile
    environment:
      YOLO_MODEL_PATH: /models/best.pt
    volumes:
      - ../models:/models
    ports:
      - "9100:9100"

  ocr-worker:
    profiles:
      - ocr
    build:
      context: ..
      dockerfile: ocr_worker/Dockerfile
    environment:
      OCR_LANG: eng+chi_sim
    ports:
      - "9200:9200"

  backend:
    build:
      context: ..
      dockerfile: backend-spring/Dockerfile
    volumes:
      - ../data:/app/data
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-}"
      SHIPCAD_WORKER_URL: http://cad-worker:9000
      SHIPCAD_VISION_URL: http://vision-worker:9100
      SHIPCAD_OCR_URL: http://ocr-worker:9200
      SHIPCAD_STORAGE_ROOT: /app/data
      SHIPCAD_DATASOURCE_URL: jdbc:h2:file:/app/data/db/shipcad;MODE=MySQL;DATABASE_TO_LOWER=TRUE
      SHIPCAD_CORS_ORIGIN: http://127.0.0.1:5173
      SHIPCAD_REVIEW_QUEUE_MODE: redis
      SHIPCAD_REDIS_HOST: valkey
      SHIPCAD_REDIS_PORT: 6379
      SHIPCAD_OBJECT_STORAGE_MODE: ${SHIPCAD_OBJECT_STORAGE_MODE:-local}
      SHIPCAD_OBJECT_STORAGE_LOCAL_ROOT: /app/data
      SHIPCAD_OBJECT_STORAGE_CACHE_ROOT: /app/data/object-cache
      SHIPCAD_S3_ENDPOINT: ${SHIPCAD_S3_ENDPOINT:-http://minio:9000}
      SHIPCAD_S3_REGION: ${SHIPCAD_S3_REGION:-us-east-1}
      SHIPCAD_S3_BUCKET: ${SHIPCAD_S3_BUCKET:-shipcad-artifacts}
      SHIPCAD_S3_ACCESS_KEY: "${SHIPCAD_S3_ACCESS_KEY:-}"
      SHIPCAD_S3_SECRET_KEY: "${SHIPCAD_S3_SECRET_KEY:-}"
      SHIPCAD_S3_PATH_STYLE: ${SHIPCAD_S3_PATH_STYLE:-true}
      SHIPCAD_S3_CREATE_BUCKET: ${SHIPCAD_S3_CREATE_BUCKET:-true}
      SHIPCAD_BOOTSTRAP_ADMIN_USERNAME: "${SHIPCAD_BOOTSTRAP_ADMIN_USERNAME:-}"
      SHIPCAD_BOOTSTRAP_ADMIN_PASSWORD: "${SHIPCAD_BOOTSTRAP_ADMIN_PASSWORD:-}"
      SHIPCAD_BOOTSTRAP_ADMIN_DISPLAY_NAME: "${SHIPCAD_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}"
    ports:
      - "8080:8080"
    depends_on:
      cad-worker:
        condition: service_started
      valkey:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: frontend-vue/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
