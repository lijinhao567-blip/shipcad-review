services:
  valkey:
    image: valkey/valkey:8.1.8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cad-worker:
    build:
      context: ..
      dockerfile: cad_worker/Dockerfile
    environment:
      LIBREDWG_DWG2DXF_BIN: dwg2dxf
    ports:
      - "9000:9000"

  vision-worker:
    profiles:
      - vision
    build:
      context: ..
      dockerfile: vision_worker/Dockerfile
    environment:
      YOLO_MODEL_PATH: /models/best.pt
    volumes:
      - ../models:/models
    ports:
      - "9100:9100"

  ocr-worker:
    profiles:
      - ocr
    build:
      context: ..
      dockerfile: ocr_worker/Dockerfile
    environment:
      OCR_LANG: eng+chi_sim
    ports:
      - "9200:9200"

  backend:
    build:
      context: ..
      dockerfile: backend-spring/Dockerfile
    volumes:
      - ../data:/app/data
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SHIPCAD_WORKER_URL: http://cad-worker:9000
      SHIPCAD_VISION_URL: http://vision-worker:9100
      SHIPCAD_OCR_URL: http://ocr-worker:9200
      SHIPCAD_STORAGE_ROOT: /app/data
      SHIPCAD_DATASOURCE_URL: jdbc:h2:file:/app/data/db/shipcad;MODE=MySQL;DATABASE_TO_LOWER=TRUE
      SHIPCAD_CORS_ORIGIN: http://127.0.0.1:5173
      SHIPCAD_REVIEW_QUEUE_MODE: redis
      SHIPCAD_REDIS_HOST: valkey
      SHIPCAD_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      cad-worker:
        condition: service_started
      valkey:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: frontend-vue/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
