apiVersion: v1
kind: Namespace
metadata:
  name: shipcad-review
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipcad-config
  namespace: shipcad-review
data:
  SPRING_PROFILES_ACTIVE: prod
  SHIPCAD_SESSION_HOURS: "8"
  SHIPCAD_WORKER_URL: http://cad-worker:9000
  SHIPCAD_VISION_URL: http://vision-worker:9100
  SHIPCAD_OCR_URL: http://ocr-worker:9200
  SHIPCAD_STORAGE_ROOT: /app/data
  SHIPCAD_CORS_ORIGIN: http://127.0.0.1:5173
  SHIPCAD_REVIEW_QUEUE_MODE: redis
  SHIPCAD_REDIS_HOST: valkey
  SHIPCAD_REDIS_PORT: "6379"
  SHIPCAD_OBJECT_STORAGE_MODE: local
  SHIPCAD_OBJECT_STORAGE_LOCAL_ROOT: /app/data
  SHIPCAD_OBJECT_STORAGE_CACHE_ROOT: /app/data/object-cache
  SHIPCAD_S3_ENDPOINT: http://minio:9000
  SHIPCAD_S3_REGION: us-east-1
  SHIPCAD_S3_BUCKET: shipcad-artifacts
  SHIPCAD_S3_PATH_STYLE: "true"
  SHIPCAD_S3_CREATE_BUCKET: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shipcad-data
  namespace: shipcad-review
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8.1.8-alpine
          command: ["valkey-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: shipcad-review
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cad-worker
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cad-worker
  template:
    metadata:
      labels:
        app: cad-worker
    spec:
      containers:
        - name: cad-worker
          image: shipcad/cad-worker:dev
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: cad-worker
  namespace: shipcad-review
spec:
  selector:
    app: cad-worker
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: shipcad/backend:dev
          envFrom:
            - configMapRef:
                name: shipcad-config
            - secretRef:
                name: shipcad-database
            - secretRef:
                name: shipcad-bootstrap-admin
                optional: true
            - secretRef:
                name: shipcad-object-storage
                optional: true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SHIPCAD_REVIEW_QUEUE_REDIS_PROCESSING_KEY
              value: shipcad:review:processing:$(POD_NAME)
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shipcad-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shipcad-review
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-worker
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-worker
  template:
    metadata:
      labels:
        app: vision-worker
    spec:
      containers:
        - name: vision-worker
          image: shipcad/vision-worker:dev
          env:
            - name: YOLO_MODEL_PATH
              value: /models/best.pt
          ports:
            - containerPort: 9100
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vision-worker
  namespace: shipcad-review
spec:
  selector:
    app: vision-worker
  ports:
    - port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      containers:
        - name: ocr-worker
          image: shipcad/ocr-worker:dev
          env:
            - name: OCR_LANG
              value: eng+chi_sim
          ports:
            - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-worker
  namespace: shipcad-review
spec:
  selector:
    app: ocr-worker
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shipcad-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shipcad/frontend:dev
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shipcad-review
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
